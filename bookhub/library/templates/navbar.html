<nav style="background:#2c3e50;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;">

    <!-- Left -->
    <div style="display:flex; align-items:center; gap:20px;">

        <a href="{% url 'book_list' %}"
           style="color:white;
                  text-decoration:none;
                  font-size:24px;
                  font-weight:bold;">
            📚 BookHub
        </a>

        {% if user.is_authenticated %}
            <a href="{% url 'add_book' %}"
               style="background:#3498db;
                      color:white;
                      padding:8px 16px;
                      border-radius:20px;
                      text-decoration:none;
                      font-weight:bold;">
                + Add Book
            </a>
        {% endif %}

    </div>

    <!-- Right -->
    <div style="display:flex; align-items:center; gap:15px;">

        {% if user.is_authenticated %}

            <span style="color:white;">
                Welcome, <strong>{{ user.username }}</strong>
            </span>

            <a href="{% url 'logout' %}"
               style="background:#e74c3c;
                      color:white;
                      padding:8px 16px;
                      border-radius:20px;
                      text-decoration:none;
                      font-weight:bold;">
                Logout
            </a>

        {% else %}

            <a href="{% url 'login' %}"
               style="color:white;
                      text-decoration:none;">
                Login
            </a>

            <a href="{% url 'register' %}"
               style="background:#2ecc71;
                      color:white;
                      padding:8px 16px;
                      border-radius:20px;
                      text-decoration:none;
                      font-weight:bold;">
                Register
            </a>

        {% endif %}

    </div>

</nav>
