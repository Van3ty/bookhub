{% extends "base.html" %}

{% block content %}

<h2>Delete Book</h2>

<hr>

<p>Are you sure you want to delete this book?</p>

<h3>"{{ book.title }}"</h3>

<form method="POST">

    {% csrf_token %}

    <button
        type="submit"
        style="
            background:#e74c3c;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:8px;
            cursor:pointer;">
        Delete
    </button>

</form>

<br>

<a href="{% url 'book_detail' book.id %}">
    Cancel
</a>

{% endblock %}
