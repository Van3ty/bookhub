{% extends "base.html" %}

{% block content %}

<h1>{{ book.title }}</h1>

<hr>

<p><strong>Author:</strong> {{ book.author }}</p>

<p><strong>Category:</strong> {{ book.category }}</p>

<p><strong>Price:</strong> ${{ book.price }}</p>

<br>

<a href="{% url 'edit_book' book.id %}"
   style="
        background:#3498db;
        color:white;
        padding:10px 18px;
        border-radius:8px;
        text-decoration:none;
        font-weight:bold;">
    ✏️ Edit
</a>

<a href="{% url 'delete_book' book.id %}"
   style="
        background:#e74c3c;
        color:white;
        padding:10px 18px;
        border-radius:8px;
        text-decoration:none;
        font-weight:bold;
        margin-left:10px;">
    🗑 Delete
</a>

<br><br>

<a href="{% url 'book_list' %}">
    ← Back to Books
</a>

{% endblock %}
